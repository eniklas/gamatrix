name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  tests:

    name: Test Python ${{ matrix.python_version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python_version: ['3.12']
    env:
      PYTHONDEVMODE: 1

    steps:
    - uses: actions/checkout@v6
      with:
        # Full history + tags so setuptools_scm can derive the version.
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install ${{ matrix.python_version }}

    - name: Install dependencies
      # --frozen installs the exact versions in uv.lock and fails if the lock is
      # out of sync with pyproject.toml, so CI matches local and deployed builds.
      run: uv sync --frozen --extra dev --extra ci

    - name: Analyze with mypy
      run: uv run mypy

    - name: Check format with Black
      run: uv run black --check .

    - name: Test with pytest
      run: uv run pytest

    - name: Build a Wheel
      run: uv run python -m build --wheel

    - uses: actions/upload-artifact@v7
      with:
        name: wheel
        path: dist/gamatrix-*-none-any.whl
